name: Infrastructure CI

on:
  pull_request:
    branches: [main]
    paths:
      - "day_22/**"
      - ".github/workflows/day22-infrastructure-ci.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate and unit test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Format check
        run: terraform fmt -check -recursive day_22

      - name: Init staging root without backend
        working-directory: day_22/live/staging
        run: terraform init -backend=false

      - name: Validate staging root
        working-directory: day_22/live/staging
        run: terraform validate

      - name: Init webserver module without backend
        working-directory: day_22/modules/services/webserver-cluster
        run: terraform init -backend=false

      - name: Unit tests
        working-directory: day_22/modules/services/webserver-cluster
        run: terraform test

  plan:
    name: Plan and upload immutable artifact
    runs-on: ubuntu-latest
    needs: validate

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Init staging root
        working-directory: day_22/live/staging
        run: terraform init

      - name: Plan
        working-directory: day_22/live/staging
        run: terraform plan -out=ci.tfplan

      - name: Upload reviewed plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: day_22/live/staging/ci.tfplan
