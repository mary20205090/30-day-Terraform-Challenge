name: Day 26 Scalable Web App Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "day_26/**"
      - ".github/workflows/day26-scalable-web-app.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Format and Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: day_26/day26-scalable-web-app/envs/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.7"

      - name: Format check
        run: terraform fmt -check -recursive ../..

      - name: Init without backend
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
